name: vibes_app
description: "Vibes - Your daily brain state check."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  record: ^5.2.0
  permission_handler: ^11.3.2
  http: ^1.2.2
  path_provider: ^2.1.4
  audioplayers: ^6.1.0
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.3.2

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.3

flutter_native_splash:
  color: "#15171B"
  image: assets/images/spalsh.png
  color_dark: "#15171B"
  image_dark: assets/images/spalsh.png
  android: true
  ios: true
  android_12:
    color: "#15171B"
    image: assets/images/spalsh.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Kamerik105
      fonts:
        - asset: assets/fonts/kamerik_105_light.otf
          weight: 300
        - asset: assets/fonts/kamerik_105_medium.otf
          weight: 500
        - asset: assets/fonts/kamerik_105_bold.otf
          weight: 700
        - asset: assets/fonts/kamerik_105_heavy.otf
          weight: 900

