name: vibes_app
description: "Vibes - Your daily brain state check."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  record: ^5.2.0
  permission_handler: ^11.3.2
  http: ^1.2.2
  path_provider: ^2.1.4
  audioplayers: ^6.1.0
  audio_session: ^0.1.21
  audio_service: ^0.18.0
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.3.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_tts: ^4.2.0

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#15171B"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#15171B"
  image: assets/images/spalsh.png
  color_dark: "#15171B"
  image_dark: assets/images/spalsh.png
  android: true
  ios: true
  android_12:
    color: "#15171B"
    image: assets/images/spalsh.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Kamerik105
      fonts:
        - asset: assets/fonts/Kamerik105Cyrillic-Thin.otf
          weight: 100
        - asset: assets/fonts/Kamerik105Cyrillic-Light.otf
          weight: 300
        - asset: assets/fonts/Kamerik105Cyrillic-Book.otf
          weight: 400
        - asset: assets/fonts/Kamerik105-Medium.otf
          weight: 500
        - asset: assets/fonts/Kamerik105Cyrillic-Bold.otf
          weight: 700
        - asset: assets/fonts/Kamerik105Cyrillic-Heavy.otf
          weight: 900

    - family: PPSupplyMono
      fonts:
        - asset: assets/fonts/PPSupplyMono-Thin.otf
          weight: 100
        - asset: assets/fonts/PPSupplyMono-Ultralight.otf
          weight: 200
        - asset: assets/fonts/PPSupplyMono-Light.otf
          weight: 300
        - asset: assets/fonts/PPSupplyMono-Regular.otf
          weight: 400
        - asset: assets/fonts/PPSupplyMono-Medium.otf
          weight: 500
        - asset: assets/fonts/PPSupplyMono-Semibold.otf
          weight: 600
        - asset: assets/fonts/PPSupplyMono-Bold.otf
          weight: 700
        - asset: assets/fonts/PPSupplyMono-Black.otf
          weight: 900

    - family: DMSans
      fonts:
        - asset: assets/fonts/DmSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DmSans-Bold.ttf
          weight: 700

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800

    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700

    - family: SFMono
      fonts:
        - asset: assets/fonts/SFMono-Light.otf
          weight: 300
        - asset: assets/fonts/SFMono-Regular.otf
          weight: 400
        - asset: assets/fonts/SFMono-Medium.otf
          weight: 500
        - asset: assets/fonts/SFMono-Semibold.otf
          weight: 600
        - asset: assets/fonts/SFMono-Bold.otf
          weight: 700
        - asset: assets/fonts/SFMono-Heavy.otf
          weight: 800

    - family: SFProDisplay
      fonts:
        - asset: assets/fonts/SFProDisplay-Thin.otf
          weight: 100
        - asset: assets/fonts/SFProDisplay-Ultralight.otf
          weight: 200
        - asset: assets/fonts/SFProDisplay-Light.otf
          weight: 300
        - asset: assets/fonts/SFProDisplay-Regular.otf
          weight: 400
        - asset: assets/fonts/SFProDisplay-Medium.otf
          weight: 500
        - asset: assets/fonts/SFProDisplay-Semibold.otf
          weight: 600
        - asset: assets/fonts/SFProDisplay-Bold.otf
          weight: 700
        - asset: assets/fonts/SFProDisplay-Heavy.otf
          weight: 800
        - asset: assets/fonts/SFProDisplay-Black.otf
          weight: 900

    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Light.ttf
          weight: 300
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700

